services:
  mariadb:
    image: mariadb:11.4  # Doporučuji LTS verzi
    container_name: leptos_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: app_db
      MARIADB_USER: dev_user
      MARIADB_PASSWORD: dev_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
